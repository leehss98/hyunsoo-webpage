<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyunsoo Lee - Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 
      EXPLANATION: 
      The following script tag explicitly loads the main React entry file.
      Vite requires this module script to know where to start bundling the app.
      Without this, the browser only renders the empty #root div, resulting in a blank page on deployment.
      Note: In this Vite project, the entry point is /src/main.tsx.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
